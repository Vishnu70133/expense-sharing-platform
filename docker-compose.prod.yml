services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  eureka-server:
    image: vishnudasari70133/eureka-server

    container_name: eureka-server
    ports:
      - "8761:8761"

  auth-service:
    image: vishnudasari70133/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_DB_URL: ${AUTH_DB_URL}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      - mysql
      - eureka-server

  user-service:
    image: vishnudasari70133/user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      USER_DB_URL: ${USER_DB_URL}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      - mysql
      - eureka-server

  group-service:
    image: vishnudasari70133/group-service
    container_name: group-service
    ports:
      - "8083:8083"
    environment:
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GROUP_DB_URL: ${GROUP_DB_URL}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      - mysql
      - eureka-server

  expense-service:
    image: vishnudasari70133/expense-service
    container_name: expense-service
    ports:
      - "8084:8084"
    environment:
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EXPENSE_DB_URL: ${EXPENSE_DB_URL}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      - mysql
      - eureka-server

  api-gateway:
    image: vishnudasari70133/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      - eureka-server

  splitwise-app:
    image: vishnudasari70133/splitwise-app
    container_name: splitwise-app
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway

volumes:
  mysql_data: