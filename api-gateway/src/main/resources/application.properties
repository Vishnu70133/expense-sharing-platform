spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL}

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Auth Service Route
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# User Service Route
spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/profiles/**

# Group Service
spring.cloud.gateway.server.webflux.routes[2].id=group-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://group-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/groups/**

# Expense Service
spring.cloud.gateway.server.webflux.routes[3].id=expense-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://expense-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/expenses/**